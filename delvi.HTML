<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUGAS 4 - JAVASCRIPT</title>
    <link rel="stylesheet" href="delvi.css">

</head>
<body>
    <!-- untuk wadah menampilkan infromasi mahasiswa berupa teks-->
    <header class="header-mahasiswa">
        <div class="info--mahasiswa">
            <h2>TENTANG SAYA SAJA</h2>
            <p>Nama : <b>Delvitri</b></p>
            <p>NIM  : <b>245314024</b></p>
        </div>

        <!-- untuk wadah foto saya-->
         <div class="info-foto">
            <img src="fotosaya.jpg">
         </div>
         <!-- kepala halaman, seperti menaruh informasi pemilik halaman/ wadahnya-->
    </header>

<!-- untuk garis supaya horizontal-->
    <hr>


    <main class="container"><!-- digunakan untuk membungkus konten utama (membuat halaman baru setelah menggunakan NAVBAR DAN HEADER selesai)-->
        <section id="section-1"><!-- digunakan untuk membuat teks menjadi beberapa bagian(pilihan 1 sampai 5)-->
            <div class="form-group"> <!-- digunakan untuk membungkus tuisan "NAMA" dan "JUMLAH PILIHAN " dan untuk kotak input-->
                <label> Nama :</label>
                <input type="text" id="input-nama" placeholder="<Teks nama>"> <!--digunakan untuk menampilkan (<teks nama>) dengan kotak dan tulisan buram di dalam kotak-->
            </div>
            <div class="form-group"> <!-- digunakan untuk membungkus tuisan "NAMA" dan "JUMLAH PILIHAN " dan untuk kotak input-->
                <label>jumlah pilihan :</label> <!-- nampilin  -->
                <input type="number" id="input-jml" placeholder="<jml>"> <!--digunakan untuk menampilkan jml dengan kotak dan tulisan buram di dalam kotak-->
            </div>

                <button id="btn-ok-1">OK </button>    
        </section>
        <br>
        <section id="section-2" class="hidden"></section>

        <section id="section-3" class="hidden"></section>

        <section id="section-akhir" class="hidden"></section>
    </main>

    <script src="delvi.script.js"></script>

</body>
</html>
